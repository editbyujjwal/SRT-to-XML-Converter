    <!-- Main Application Wrapper (Tight 560px width for focus) -->

        <!-- Main Card Container -->
        <main class="w-full bg-white/80 backdrop-blur-2xl border border-white rounded-[28px] shadow-[0_40px_80px_-20px_rgba(0,0,0,0.08),inset_0_1px_0_rgba(255,255,255,1)] p-6 sm:p-8 flex flex-col gap-6 relative overflow-hidden">

            <!-- Title & Subtitle -->

                    Convert to <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-blue-500">XML</span>
                </h2>
                <p class="text-sm text-slate-500 font-medium">Upload your SRT file or paste the text directly.</p>
            </div>

            <!-- Interaction Zone -->
            <div class="flex flex-col gap-5">
                
                <!-- Upload Box -->
                <div id="dropZone" class="group relative w-full h-32 rounded-2xl border-[1.5px] border-dashed border-slate-300 bg-slate-50/50 hover:bg-indigo-50/50 hover:border-indigo-400 hover:shadow-[0_0_20px_rgba(99,102,241,0.1)] transition-all duration-300 cursor-pointer flex flex-col items-center justify-center overflow-hidden">
                    <input type="file" id="fileInput" accept=".srt,.txt" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                    
                    <div class="w-10 h-10 mb-2 rounded-full bg-white shadow-sm border border-slate-100 text-slate-400 group-hover:text-indigo-500 flex items-center justify-center group-hover:scale-110 group-hover:-translate-y-1 transition-all duration-300">

                    </div>
                    
                    <!-- Success state badge (Hidden initially) -->
                    <div id="fileStatus" class="absolute inset-0 bg-indigo-50/95 backdrop-blur-sm hidden flex-col items-center justify-center border-indigo-200 z-20">
                        <div class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center mb-1">
                            <i data-lucide="file-check-2" class="w-4 h-4"></i>
                        </div>
                        <span id="fileNameDisplay" class="text-xs font-semibold text-indigo-700 max-w-[80%] truncate"></span>
                    </div>
                </div>

                <!-- Divider -->
                <div class="flex items-center gap-3">
                    <div class="h-px flex-1 bg-slate-200"></div>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">or paste</span>
                    <div class="h-px flex-1 bg-slate-200"></div>
                </div>

                <!-- Text Area -->
                <div class="relative group">
                    <textarea 
                        id="srtInput" 
                        placeholder="00:00:00,000 --> 00:00:02,000&#10;Your subtitles here..." 
                        class="w-full h-28 bg-slate-50/80 border border-slate-200 rounded-2xl p-4 font-mono text-xs text-slate-700 focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 focus:bg-white transition-all resize-y placeholder:text-slate-400 shadow-inner"
                    ></textarea>
                </div>
            </div>

            <!-- Primary CTA -->
            <button onclick="processSRT()" class="group relative w-full flex items-center justify-center gap-2 bg-gradient-to-b from-indigo-500 to-indigo-600 hover:from-indigo-600 hover:to-indigo-700 text-white font-semibold text-sm rounded-xl py-3.5 shadow-[0_1px_2px_rgba(0,0,0,0.1),0_8px_16px_-4px_rgba(79,70,229,0.4)] hover:shadow-[0_1px_2px_rgba(0,0,0,0.1),0_12px_24px_-4px_rgba(79,70,229,0.5)] active:scale-[0.98] transition-all duration-200 overflow-hidden border border-indigo-700/50">
                <!-- Inner top highlight for 3D effect -->
                <div class="absolute top-0 inset-x-0 h-px bg-white/20"></div>
                <i data-lucide="zap" class="w-4 h-4 text-indigo-100 group-hover:text-white group-hover:animate-pulse"></i>
                <span class="tracking-wide">Generate XML</span>
            </button>

            <!-- Output Section (Hidden) -->
            <div id="outputSection" class="hidden flex-col gap-3 pt-6 mt-2 border-t border-slate-100 animate-[fadeIn_0.4s_ease-out]">
                <div class="flex justify-between items-center">
                    <h3 class="text-xs font-semibold uppercase tracking-wider text-slate-400 flex items-center gap-1.5">
                        <div class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse-slow"></div>
                        Output Ready
                    </h3>
                    <div class="flex gap-2">
                        <button onclick="copyToClipboard()" class="p-1.5 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors tooltip-trigger" title="Copy Code">
                            <i data-lucide="copy" class="w-4 h-4"></i>
                        </button>
                        <button onclick="downloadXML()" class="p-1.5 text-slate-400 hover:text-emerald-600 hover:bg-emerald-50 rounded-lg transition-colors tooltip-trigger" title="Download .xml">
                            <i data-lucide="download" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
                <textarea 
                    id="xmlOutput" 
                    readonly 
                    class="w-full h-32 bg-slate-900 border border-slate-800 rounded-xl p-4 font-mono text-[11px] text-emerald-400 focus:outline-none focus:ring-2 focus:ring-emerald-500/30 resize-y shadow-inner custom-scrollbar"
                ></textarea>
                
                <button id="downloadBtn" onclick="downloadXML()" class="w-full mt-2 flex items-center justify-center gap-2 bg-emerald-500 hover:bg-emerald-600 text-white font-semibold text-sm rounded-xl py-3 shadow-[0_4px_12px_-2px_rgba(16,185,129,0.4)] active:scale-[0.98] transition-all duration-200 border border-emerald-600/50">
                    <div class="absolute top-0 inset-x-0 h-px bg-white/20 rounded-t-xl"></div>
                    <i data-lucide="arrow-down-to-line" class="w-4 h-4"></i>
                    <span>Download File</span>
                </button>
            </div>
            
        </main>

        <!-- Minimal Footer -->
        <footer class="flex items-center justify-between px-2 pt-2">
            <p class="text-xs font-medium text-slate-400">Crafted by <a href="https://www.instagram.com/editbyujjwal" target="_blank" class="text-slate-500 hover:text-indigo-600 transition-colors">@editbyujjwal</a></p>
            <div class="flex items-center gap-4">
                <a href="#" class="text-slate-400 hover:text-indigo-600 transition-colors transform hover:scale-110">
                    <i data-lucide="briefcase" class="w-4 h-4"></i>
                </a>
                <a href="https://www.instagram.com/editbyujjwal" target="_blank" class="text-slate-400 hover:text-pink-600 transition-colors transform hover:scale-110">
                    <i data-lucide="instagram" class="w-4 h-4"></i>
                </a>
            </div>
        </footer>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-6 right-6 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // --- Toast System (Redesigned for top-right sleekness) ---
        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const isError = type === 'error';
            const icon = isError ? 'alert-circle' : 'check-circle-2';
            const bgClass = isError ? 'bg-red-50 border-red-100 text-red-800' : 'bg-emerald-50 border-emerald-100 text-emerald-800';
            const iconColor = isError ? 'text-red-500' : 'text-emerald-500';

            toast.className = `flex items-center gap-2.5 px-4 py-3 rounded-xl border shadow-lg backdrop-blur-md toast-enter-active ${bgClass} pointer-events-auto`;
            
            toast.innerHTML = `
                <i data-lucide="${icon}" class="w-4 h-4 ${iconColor}"></i>
                <span class="font-semibold text-xs tracking-wide">${message}</span>
            `;
            
            container.appendChild(toast);
            lucide.createIcons({ root: toast });

            setTimeout(() => {
                toast.classList.replace('toast-enter-active', 'toast-leave');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // --- Core Application Logic ---
        let currentFileName = "Converted_Subtitles";
        const fileInput = document.getElementById('fileInput');
        const srtInput = document.getElementById('srtInput');
        const dropZone = document.getElementById('dropZone');
        const fileStatus = document.getElementById('fileStatus');
        const fileNameDisplay = document.getElementById('fileNameDisplay');

        // Drag & Drop UX
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.add('border-indigo-500', 'bg-indigo-50/80', 'scale-[1.02]');
            });
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.remove('border-indigo-500', 'bg-indigo-50/80', 'scale-[1.02]');
            });
        });

        dropZone.addEventListener('drop', (e) => {
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            currentFileName = file.name.replace(/\.[^/.]+$/, "");
            
            // Show attached state
            fileNameDisplay.textContent = file.name;
            fileStatus.classList.remove('hidden');
            fileStatus.classList.add('flex');
            
            const reader = new FileReader();
            reader.onload = (e) => {
                srtInput.value = e.target.result;
                showToast('File loaded successfully', 'success');
            };
            reader.readAsText(file);
        }

        // Parsing logic
        function processSRT() {
            const rawText = srtInput.value.trim();
            if (!rawText) {
                showToast('Please paste text or upload a file');
                return;
            }

            const subtitles = parseSRTContent(rawText);
            
            if (subtitles.length === 0) {
                showToast('No valid timestamps found');
                return;
            }

            const xmlString = generateAMXML(subtitles);
            
            // UI Updates
            const outputSection = document.getElementById('outputSection');
            const xmlOutput = document.getElementById('xmlOutput');

            xmlOutput.value = xmlString;
            
            outputSection.classList.remove('hidden');
            outputSection.classList.add('flex');

            showToast('XML Generated Successfully', 'success');
        }

        function parseSRTContent(text) {
            const normalizedText = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            const blocks = normalizedText.split(/\n{2,}/);
            const subtitles = [];

            blocks.forEach(block => {
                const lines = block.trim().split('\n');
                if (lines.length < 2) return;

                let timeLineIndex = -1;
                let match = null;
                const timeRegex = /^(\d{2}:\d{2}:\d{2}[,\.]\d{3})\s*-->\s*(\d{2}:\d{2}:\d{2}[,\.]\d{3})\s*(.*)$/;

                for (let i = 0; i < lines.length; i++) {
                    match = lines[i].match(timeRegex);
                    if (match) {
                        timeLineIndex = i;
                        break;
                    }
                }

                if (timeLineIndex !== -1 && match) {
                    const startMs = timeToMilliseconds(match[1]);
                    const endMs = timeToMilliseconds(match[2]);
                    let content = match[3] ? match[3].trim() : '';

                    for (let i = timeLineIndex + 1; i < lines.length; i++) {
                        const lineText = lines[i].trim();
                        if (lineText) {
                            if (content) content += '\n';
                            content += lineText;
                        }
                    }

                    if (content) {
                        subtitles.push({ startMs, endMs, content });
                    }
                }
            });

            return subtitles;
        }

        function timeToMilliseconds(timeString) {
            const parts = timeString.split(/[,\.]/);
            const timeParts = parts[0].split(':').map(Number);
            const ms = Number(parts[1] || 0);

            const hours = timeParts[0] || 0;
            const minutes = timeParts[1] || 0;
            const seconds = timeParts[2] || 0;

            return (hours * 3600000) + (minutes * 60000) + (seconds * 1000) + ms;
        }

        function generateAMXML(subtitles) {
            const totalTime = subtitles[subtitles.length - 1].endMs;
            const modifiedTime = Date.now();
            let elementId = 102351839;

            let xml = `<?xml version='1.0' encoding='UTF-8' ?>\n`;
            xml += `<!-- Generated by SRT Converter Pro -->\n`;
            
            xml += `<scene title="${currentFileName}" width="720" height="1280" exportWidth="720" exportHeight="1280" precompose="dynamicResolution" bgcolor="#ffd8d8d8" totalTime="${totalTime}" fps="24" modifiedTime="${modifiedTime}" amver="1002351" ffver="106" am="com.alightcreative.motion/5.0.270.1002578" amplatform="android" retime="freeze" retimeAdaptFPS="false">\n`;

            xml += `  <shape id="102351835" label="Rectangle 1" startTime="0" endTime="${totalTime}" fillType="color" mediaFillMode="fill" s=".rect">\n`;
            xml += `    <transform>\n`;
            xml += `      <location value="360.000000,640.000000,0.00
