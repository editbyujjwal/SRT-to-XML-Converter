            <div class="flex items-center gap-4">
                <a href="#" class="text-slate-400 hover:text-indigo-600 transition-colors transform hover:scale-110">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                </a>
                <a href="https://www.instagram.com/editbyujjwal" target="_blank" class="text-slate-400 hover:text-pink-600 transition-colors transform hover:scale-110">

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-6 right-6 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <script>
        // --- Custom Toast System ---
        // Notification dikhane ke liye function
        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const isError = type === 'error';
            const bgClass = isError ? 'bg-red-50 border-red-100 text-red-800' : 'bg-emerald-50 border-emerald-100 text-emerald-800';
            
            // Inline SVG icons for toast
            const errorSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 text-red-500"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>`;
            const successSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 text-emerald-500"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>`;

            toast.className = `flex items-center gap-2.5 px-4 py-3 rounded-xl border shadow-lg backdrop-blur-md toast-enter-active ${bgClass} pointer-events-auto`;
            
            toast.innerHTML = `
                ${isError ? errorSvg : successSvg}
                <span class="font-semibold text-xs tracking-wide">${message}</span>
            `;
            
            container.appendChild(toast);

            // 3 second baad toast hide karna
            setTimeout(() => {
                toast.classList.replace('toast-enter-active', 'toast-leave');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // --- Core Application Logic ---
        let currentFileName = "Converted_Subtitles";
        let generatedXML = ""; // Data in-memory store karne ke liye
        const fileInput = document.getElementById('fileInput');
        const srtInput = document.getElementById('srtInput');
        const dropZone = document.getElementById('dropZone');
        const fileStatus = document.getElementById('fileStatus');
        const fileNameDisplay = document.getElementById('fileNameDisplay');

        // Drag & Drop event listeners
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.add('border-indigo-500', 'bg-indigo-50/80', 'scale-[1.02]');
            });
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.remove('border-indigo-500', 'bg-indigo-50/80', 'scale-[1.02]');
            });
        });

        // Drop par file handle karna
        dropZone.addEventListener('drop', (e) => {
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });

        // Input button click par file handle karna
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) handleFile(e.target.files[0]);
        });

        // File read karne ka logic
        function handleFile(file) {
            try {
                currentFileName = file.name.replace(/\.[^/.]+$/, "");
                
                // UI mein file ka naam dikhana
                fileNameDisplay.textContent = file.name;
                fileStatus.classList.remove('hidden');
                fileStatus.classList.add('flex');
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    srtInput.value = e.target.result;
                    showToast('File loaded successfully', 'success');
                };
                reader.onerror = () => {
                    showToast('Failed to read file', 'error');
                };
                reader.readAsText(file);
            } catch (error) {
                showToast('Error uploading file', 'error');
                console.error(error);
            }
        }

        // Generate button press par SRT ko process karna
        function processSRT() {
            try {
                const rawText = srtInput.value.trim();
                if (!rawText) {
                    showToast('Please paste text or upload a file', 'error');
                    return;
                }

                const subtitles = parseSRTContent(rawText);
                
                if (subtitles.length === 0) {
                    showToast('No valid timestamps found', 'error');
                    return;
                }

                const xmlString = generateAMXML(subtitles);
                
                // XML ko memory mein save karna aur Download button dikhana
                generatedXML = xmlString;
                const outputSection = document.getElementById('outputSection');
                
                outputSection.classList.remove('hidden');
                outputSection.classList.add('block');

                showToast('XML Generated Successfully', 'success');
            } catch (error) {
                showToast('Something went wrong during conversion', 'error');
                console.error(error);
            }
        }

        // SRT text ko parse karne ka main function
        function parseSRTContent(text) {
            const normalizedText = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            const blocks = normalizedText.split(/\n{2,}/);
            const subtitles = [];

            blocks.forEach(block => {
                const lines = block.trim().split('\n');
                if (lines.length < 2) return;

                let timeLineIndex = -1;
                let match = null;
                const timeRegex = /^(\d{2}:\d{2}:\d{2}[,\.]\d{3})\s*-->\s*(\d{2}:\d{2}:\d{2}[,\.]\d{3})\s*(.*)$/;

                for (let i = 0; i < lines.length; i++) {
                    match = lines[i].match(timeRegex);
                    if (match) {
                        timeLineIndex = i;
                        break;
                    }
                }

                if (timeLineIndex !== -1 && match) {
                    const startMs = timeToMilliseconds(match[1]);
                    const endMs = timeToMilliseconds(match[2]);
                    let content = match[3] ? match[3].trim() : '';

                    // Time ke baad waali lines collect karna
                    for (let i = timeLineIndex + 1; i < lines.length; i++) {
