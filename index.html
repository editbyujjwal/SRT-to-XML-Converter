<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRT to XML | Editorial Converter</title>
    
    <!-- Google Fonts: Editorial Serif + Clean Sans-Serif -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Quiet Luxury Palette */
            --bg-body: #f5f5f4;
            --bg-card: #ffffff;
            --bg-input: #fcfcfc;
            --bg-hover: #f9f9f8;
            
            --text-main: #121212;
            --text-muted: #737373;
            --text-light: #a3a3a3;
            
            --border-light: #e5e5e5;
            --border-dark: #d4d4d4;
            --border-focus: #121212;
            
            --black: #0a0a0a;
            --white: #ffffff;
            
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            position: relative;
        }

        /* Subtle Noise Texture Overlay */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            opacity: 0.25;
            pointer-events: none;
            z-index: -1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .container {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }

        /* Main Card Container */
        .card {
            background-color: var(--bg-card);
            border-radius: 24px;
            padding: 48px 32px;
            box-shadow: 
                0 4px 24px -8px rgba(0, 0, 0, 0.03),
                0 1px 2px rgba(0, 0, 0, 0.01);
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        /* Editorial Header Typography */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(32px, 8vw, 42px);
            line-height: 1.1;
            color: var(--text-main);
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }

        .header h1 .serif-regular { font-weight: 500; }
        .header h1 .serif-italic { 
            font-weight: 400; 
            font-style: italic; 
            color: var(--text-muted); 
        }

        .header p {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 0.01em;
        }

        /* Upload Zone Interactive Box */
        .upload-zone {
            background-color: var(--bg-input);
            border: 1px dashed var(--border-dark);
            border-radius: 16px;
            padding: 36px 24px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .upload-zone:hover, .upload-zone.dragover {
            background-color: var(--bg-hover);
            border-color: var(--border-focus);
            border-style: solid;
        }

        .upload-icon {
            color: var(--text-main);
            stroke-width: 1.5;
        }

        .upload-text {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
        }

        .upload-subtext {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Invisible but functional file input */
        .file-input-hidden {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 10;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 28px 0;
            color: var(--text-light);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: var(--border-light);
        }

        .divider span { padding: 0 16px; }

        textarea {
            width: 100%;
            height: 110px;
            background-color: var(--bg-input);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 16px 20px;
            font-size: 14px;
            color: var(--text-main);
            resize: none;
            transition: var(--transition);
            line-height: 1.6;
            font-family: 'Inter', sans-serif;
        }

        textarea:focus {
            outline: none;
            border-color: var(--border-focus);
            background-color: var(--bg-card);
        }

        .status-container {
            height: 20px;
            margin: 24px 0 12px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background-color: var(--border-light);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .status-dot.visible { opacity: 1; }
        .status-dot.processing { background-color: var(--text-main); animation: pulse 1.5s infinite; }
        .status-dot.error { background-color: #ef4444; }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        .status-text {
            font-size: 13px;
            color: var(--text-muted);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .status-text.visible { opacity: 1; }

        .btn {
            width: 100%;
            height: 52px;
            background-color: var(--black);
            color: var(--white);
            border: none;
            border-radius: 9999px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.3s var(--transition), background-color 0.3s ease;
        }

        .btn:hover { transform: translateY(-2px); background-color: #1a1a1a; }
        .btn:active { transform: translateY(1px); }
        .btn.loading { pointer-events: none; opacity: 0.6; }

        .footer {
            margin-top: 32px;
            text-align: center;
            font-size: 13px;
            color: var(--text-light);
        }

        .footer a { color: var(--text-muted); text-decoration: none; border-bottom: 1px solid transparent; transition: var(--transition); }
        .footer a:hover { color: var(--text-main); border-bottom-color: var(--text-main); }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <header class="header">
                <h1>
                    <span class="serif-regular">SRT &rarr; XML</span><br>
                    <span class="serif-italic">Converter</span>
                </h1>
                <p>Convert subtitles into motion-ready XML</p>
            </header>

            <div class="upload-zone" id="dropzone">
                <input type="file" id="fileInput" class="file-input-hidden" accept=".srt">
                <svg class="upload-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <div style="pointer-events: none;">
                    <span class="upload-text" id="uploadText">Drop your .srt file here</span>
                    <br> 
                    <span class="upload-subtext">or tap to browse</span>
                </div>
            </div>

            <div class="divider"><span>OR</span></div>

            <textarea id="srtInput" placeholder="Paste your SRT here..." spellcheck="false"></textarea>

            <div class="status-container">
                <div class="status-dot" id="statusDot"></div>
                <span class="status-text" id="statusText">No input detected</span>
            </div>

            <button class="btn" id="convertBtn">Convert & Download</button>
        </div>

        <div class="footer">
            by <a href="https://www.instagram.com/editbyujjwal" target="_blank" rel="noopener noreferrer">@editbyujjwal</a>
        </div>
    </div>

    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const srtInput = document.getElementById('srtInput');
        const convertBtn = document.getElementById('convertBtn');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        const uploadTextLabel = document.getElementById('uploadText');

        let isProcessing = false;
        let fileName = "Caption";
        let statusTimeout = null;

        // Clean UI helpers
        function setStatus(msg, state = 'ready') {
            if (statusTimeout) clearTimeout(statusTimeout);
            statusText.textContent = msg;
            statusText.classList.add('visible');
            statusDot.classList.add('visible');
            statusDot.className = 'status-dot visible ' + state;
            
            if (state === 'ready' || state === 'error') {
                statusTimeout = setTimeout(() => {
                    statusText.classList.remove('visible');
                    statusDot.classList.remove('visible');
                }, 4000);
            }
        }

        // Standard escaping for XML security
        function escapeXml(s) {
            return s.replace(/[<>&'"]/g, c => ({
                "<": "&lt;", ">": "&gt;", "&": "&amp;", "'": "&apos;", '"': "&quot;"
            }[c]));
        }

        // Advanced time string to MS converter
        function toMs(t) {
            const p = t.trim().replace(",", ".").split(".");
            const [h, m, s] = p[0].split(":").map(Number);
            let ms = (p[1] || "0").padEnd(3, "0").slice(0, 3);
            return (h * 3600 + m * 60 + s) * 1000 + Number(ms);
        }

        // Logic to handle file reading
        async function handleFile(file) {
            if (!file) return;
            if (!file.name.toLowerCase().endsWith(".srt")) {
                setStatus("Only .srt files allowed", 'error');
                return;
            }
            fileName = file.name.replace(/\.[^/.]+$/, "");
            uploadTextLabel.textContent = file.name;
            setStatus("Reading file...", 'processing');
            try {
                const text = await file.text();
                srtInput.value = text;
                setStatus("File ready", 'ready');
            } catch {
                setStatus("Failed to read file", 'error');
            }
        }

        // Events
        fileInput.addEventListener("change", e => handleFile(e.target.files[0]));
        
        ['dragenter', 'dragover'].forEach(n => dropzone.addEventListener(n, e => {
            e.preventDefault(); dropzone.classList.add('dragover');
        }));
        ['dragleave', 'drop'].forEach(n => dropzone.addEventListener(n, e => {
            e.preventDefault(); dropzone.classList.remove('dragover');
        }));
        dropzone.addEventListener("drop", e => handleFile(e.dataTransfer.files[0]));

        srtInput.addEventListener('input', () => {
            if (srtInput.value.trim()) setStatus("Text detected", "ready");
        });

        // Conversion Logic
        convertBtn.addEventListener("click", () => {
            if (isProcessing) return;
            const input = srtInput.value.trim();
            if (!input) { setStatus("No input detected", "error"); return; }

            isProcessing = true;
            convertBtn.classList.add('loading');
            setStatus("Converting...", "processing");

            setTimeout(() => {
                try {
                    // Split into subtitle blocks
                    const blocks = input.split(/\n\s*\n/);
                    let xmlItems = [];
                    let maxTime = 0;

                    blocks.forEach((block, idx) => {
                        const lines = block.split("\n").map(l => l.trim()).filter(l => l !== "");
                        // Find the line containing the timestamp arrow
                        const timeLineIndex = lines.findIndex(l => l.includes("-->"));
                        if (timeLineIndex === -1) return;

                        const timeLine = lines[timeLineIndex];
                        const timestamps = timeLine.match(/(\d+:\d+:\d+[,\.]\d+)\s*-->\s*(\d+:\d+:\d+[,\.]\d+)/);
                        
                        if (timestamps) {
                            const start = toMs(timestamps[1]);
                            const end = toMs(timestamps[2]);
                            // Subtitle content is everything after the timestamp line
                            const content = lines.slice(timeLineIndex + 1).join("\n");

                            maxTime = Math.max(maxTime, end);
                            const id = 100001 + idx;

                            xmlItems.push(`  <text id="${id}" startTime="${start}" endTime="${end}" fillType="color" mediaFillMode="fill" size="14.000000" font="googlefonts?name=Roboto&amp;weight=700" wrapWidth="512" align="center">
    <transform>
      <location value="360.000000,640.000000,0.000000" />
    </transform>
    <shadow direction="outside" enabled="false">
      <opacity value="0.200000" />
    </shadow>
    <content>${escapeXml(content)}</content>
  </text>`);
                        }
                    });

                    if (xmlItems.length === 0) throw new Error("Format error");

                    const finalXml = `<?xml version='1.0' encoding='UTF-8' ?>
<scene title="${escapeXml(fileName)} @editbyujjwal" width="720" height="1280" exportWidth="1280" exportHeight="720" precompose="dynamicResolution" bgcolor="#ff000000" totalTime="${maxTime}" fps="24" modifiedTime="${Date.now()}" amver="1002351" ffver="106" am="com.alightcreative.motion/5.0.270.1002578" amplatform="android" retime="freeze" retimeAdaptFPS="false">
${xmlItems.join("\n")}
</scene>`;

                    // Download Execution
                    const blob = new Blob([finalXml], { type: "text/xml" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = `${fileName}.xml`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);

                    setStatus("Download started", "ready");
                } catch (e) {
                    setStatus("Invalid SRT format", "error");
                } finally {
                    isProcessing = false;
                    convertBtn.classList.remove('loading');
                }
            }, 500);
        });
    </script>
</body>
</html>
