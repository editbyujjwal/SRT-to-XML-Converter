<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRT to XML | Editorial Converter</title>
    
    <!-- Google Fonts: Editorial Serif + Clean Sans-Serif -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Quiet Luxury Palette */
            --bg-body: #f5f5f4;
            --bg-card: #ffffff;
            --bg-input: #fcfcfc;
            --bg-hover: #f9f9f8;
            
            --text-main: #121212;
            --text-muted: #737373;
            --text-light: #a3a3a3;
            
            --border-light: #e5e5e5;
            --border-dark: #d4d4d4;
            --border-focus: #121212;
            
            --black: #0a0a0a;
            --white: #ffffff;
            
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            position: relative;
        }

        /* Subtle Noise Texture */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            opacity: 0.25;
            pointer-events: none;
            z-index: -1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .container {
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }

        /* Main Card */
        .card {
            background-color: var(--bg-card);
            border-radius: 24px;
            padding: 48px 32px;
            box-shadow: 
                0 4px 24px -8px rgba(0, 0, 0, 0.03),
                0 1px 2px rgba(0, 0, 0, 0.01);
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        /* Editorial Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(32px, 8vw, 42px);
            line-height: 1.1;
            color: var(--text-main);
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }

        .header h1 .serif-regular {
            font-weight: 500;
        }

        .header h1 .serif-italic {
            font-weight: 400;
            font-style: italic;
            color: var(--text-muted);
        }

        .header p {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 0.01em;
        }

        /* Upload Section */
        .upload-zone {
            background-color: var(--bg-input);
            border: 1px dashed var(--border-dark);
            border-radius: 16px;
            padding: 36px 24px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .upload-zone:hover, .upload-zone.dragover {
            background-color: var(--bg-hover);
            border-color: var(--border-focus);
            border-style: solid;
        }

        .upload-icon {
            color: var(--text-main);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            stroke-width: 1.5;
        }

        .upload-zone:hover .upload-icon {
            transform: translateY(-2px);
        }

        .upload-text {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
        }

        .upload-subtext {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 28px 0;
            color: var(--text-light);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: var(--border-light);
        }

        .divider span {
            padding: 0 16px;
        }

        /* Textarea */
        textarea {
            width: 100%;
            height: 110px;
            background-color: var(--bg-input);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 16px 20px;
            font-size: 14px;
            color: var(--text-main);
            resize: none;
            transition: var(--transition);
            line-height: 1.6;
            font-family: 'Inter', sans-serif;
        }

        textarea::placeholder {
            color: var(--text-light);
        }

        textarea:focus {
            outline: none;
            border-color: var(--border-focus);
            background-color: var(--bg-card);
        }

        /* Status Text */
        .status-container {
            height: 20px;
            margin: 24px 0 12px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background-color: var(--border-light);
            transition: var(--transition);
            opacity: 0;
        }

        .status-dot.visible {
            opacity: 1;
        }

        .status-dot.processing {
            background-color: var(--text-main);
            animation: pulse 1.5s infinite ease-in-out;
        }

        .status-dot.ready {
            background-color: var(--text-muted);
        }

        .status-text {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 400;
            opacity: 0;
            transform: translateY(2px);
            transition: all 0.3s ease;
        }

        .status-text.visible {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        /* ElevenLabs Style CTA Button */
        .btn {
            width: 100%;
            height: 52px;
            background-color: var(--black);
            color: var(--white);
            border: none;
            border-radius: 9999px; /* Pill shape */
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.01em;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            background-color: #1a1a1a;
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn.loading {
            pointer-events: none;
            background-color: var(--text-muted);
        }

        /* Footer */
        .footer {
            margin-top: 32px;
            text-align: center;
            font-size: 13px;
            color: var(--text-light);
        }

        .footer a {
            color: var(--text-muted);
            text-decoration: none;
            transition: var(--transition);
            padding-bottom: 2px;
            border-bottom: 1px solid transparent;
        }

        .footer a:hover {
            color: var(--text-main);
            border-bottom-color: var(--text-main);
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .card {
                padding: 40px 24px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <header class="header">
                <h1>
                    <span class="serif-regular">SRT &rarr; XML</span><br>
                    <span class="serif-italic">Converter</span>
                </h1>
                <p>Convert subtitles into motion-ready XML</p>
            </header>

            <div class="upload-zone" id="dropzone">
                <svg class="upload-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <div style="display: flex; flex-direction: column; gap: 4px;">
                    <span class="upload-text" id="uploadText">Drop your .srt file here</span>
                    <span class="upload-subtext" id="uploadSubtext">or click to browse</span>
                </div>
            </div>
            
            <!-- FIXED: Hidden input moved outside the clickable box to prevent browser bubbling issues -->
            <input type="file" id="fileInput" accept=".srt" style="display: none;">

            <div class="divider">
                <span>OR</span>
            </div>

            <textarea id="srtInput" placeholder="Paste your SRT here..." spellcheck="false"></textarea>

            <div class="status-container">
                <div class="status-dot" id="statusDot"></div>
                <span class="status-text" id="statusText"></span>
            </div>

            <button class="btn" id="convertBtn">
                <span id="btnText">Convert & Download</span>
            </button>
        </div>

        <div class="footer">
            by <a href="https://www.instagram.com/editbyujjwal" target="_blank" rel="noopener noreferrer">@editbyujjwal</a>
        </div>
    </div>

    <script>
        // DOM Elements
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const srtInput = document.getElementById('srtInput');
        const convertBtn = document.getElementById('convertBtn');
        const btnText = document.getElementById('btnText');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        const uploadText = document.getElementById('uploadText');
        const uploadSubtext = document.getElementById('uploadSubtext');

        let fileContent = '';
        let fileName = 'Caption';

        // Helper: Convert time string to ms
        const timeToMs = (timeStr) => {
            if (!timeStr) return 0;
            const [time, ms] = timeStr.replace(',', '.').split('.');
            const [hours, minutes, seconds] = time.split(':').map(Number);
            return (hours * 3600 + minutes * 60 + seconds) * 1000 + (Number(ms) || 0);
        };

        // Helper: Escape XML entities
        const escapeXml = (unsafe) => {
            return unsafe
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&apos;');
        };

        // UI Updates: Status Text handling
        const showStatus = (message, state) => {
            statusText.textContent = message;
            statusText.classList.add('visible');
            statusDot.classList.add('visible');
            
            // Clean previous states
            statusDot.className = 'status-dot visible';
            
            if (state === 'processing') {
                statusDot.classList.add('processing');
                btnText.textContent = 'Processing...';
                convertBtn.classList.add('loading');
            } else if (state === 'ready') {
                statusDot.classList.add('ready');
                btnText.textContent = 'Convert & Download';
                convertBtn.classList.remove('loading');
            } else if (state === 'idle') {
                statusText.classList.remove('visible');
                statusDot.classList.remove('visible');
                btnText.textContent = 'Convert & Download';
                convertBtn.classList.remove('loading');
            }
        };

        // File Drag & Drop Handlers
        dropzone.addEventListener('click', () => {
            fileInput.click();
        });

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropzone.addEventListener(eventName, () => dropzone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropzone.addEventListener(eventName, () => dropzone.classList.remove('dragover'), false);
        });

        dropzone.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        });

        fileInput.addEventListener('change', function() {
            handleFiles(this.files);
        });

        function handleFiles(files) {
            if (files.length === 0) return;
            const file = files[0];
            
            if (!file.name.endsWith('.srt')) {
                showStatus('Invalid file type', 'ready');
                return;
            }

            fileName = file.name.replace('.srt', '');
            const reader = new FileReader();
            
            reader.onload = (e) => {
                fileContent = e.target.result;
                srtInput.value = ''; // Clear fallback textarea
                uploadText.textContent = file.name;
                uploadSubtext.textContent = 'File attached';
                showStatus('File ready', 'ready');
                fileInput.value = ''; // Reset input to allow re-uploading the same file
            };
            
            reader.onerror = () => showStatus('Failed to read file', 'ready');
            reader.readAsText(file);
        }

        // Textarea Handler
        srtInput.addEventListener('input', () => {
            if (srtInput.value.trim() !== '') {
                fileContent = srtInput.value;
                uploadText.textContent = 'Drop your .srt file here';
                uploadSubtext.textContent = 'or click to browse';
                fileName = 'Caption';
                showStatus('Text ready', 'ready');
            } else {
                fileContent = '';
                showStatus('', 'idle');
            }
        });

        // Convert & Download Logic
        convertBtn.addEventListener('click', () => {
            const inputToProcess = srtInput.value.trim() || fileContent.trim();

            if (!inputToProcess) {
                showStatus('No data provided', 'ready');
                return;
            }

            showStatus('Processing...', 'processing');

            // Slight delay to feel like a process is running (premium UX pace)
            setTimeout(() => {
                try {
                    const normalizedSrt = inputToProcess.replace(/\r\n/g, '\n').trim();
                    const blocks = normalizedSrt.split(/\n{2,}/);

                    let xmlElements = [];
                    let totalTime = 0;
                    let validCount = 0;

                    blocks.forEach((block) => {
                        const lines = block.split('\n');
                        let startTimeMs = 0;
                        let endTimeMs = 0;
                        let text = '';

                        for (let i = 0; i < lines.length; i++) {
                            const line = lines[i];
                            // Match 00:00:00,000 --> 00:00:00,000
                            const timeMatch = line.match(/(\d{2}:\d{2}:\d{2}[,\.]\d{2,3})\s*-->\s*(\d{2}:\d{2}:\d{2}[,\.]\d{2,3})(.*)/);
                            
                            if (timeMatch) {
                                startTimeMs = timeToMs(timeMatch[1]);
                                endTimeMs = timeToMs(timeMatch[2]);
                                
                                const inlineText = timeMatch[3].trim();
                                const followingText = lines.slice(i + 1).join('\n').trim();
                                
                                if (inlineText && followingText) {
                                    text = inlineText + '\n' + followingText;
                                } else if (inlineText) {
                                    text = inlineText;
                                } else {
                                    text = followingText;
                                }
                                break;
                            }
                        }

                        if (text) {
                            totalTime = Math.max(totalTime, endTimeMs);
                            validCount++;
                            const textId = 100000 + validCount;
                            const escapedText = escapeXml(text);

                            const xmlNode = `  <text id="${textId}" startTime="${startTimeMs}" endTime="${endTimeMs}" fillType="color" mediaFillMode="fill" size="18.000000" font="googlefonts?name=Roboto&amp;weight=400" wrapWidth="512" align="center">
    <transform>
      <location value="360.000000,640.000000,0.000000" />
    </transform>
    <fillColor value="#ff7f7f7f" />
    <content>${escapedText}</content>
  </text>`;
                            xmlElements.push(xmlNode);
                        }
                    });

                    if (xmlElements.length === 0) {
                        showStatus('Formatting issue detected', 'ready');
                        return;
                    }

                    const finalXml = `<?xml version='1.0' encoding='UTF-8' ?>
<scene title="${fileName} @editbyujjwal" width="720" height="1280" exportWidth="1280" exportHeight="720" precompose="dynamicResolution" bgcolor="#ff000000" totalTime="${totalTime}" fps="24" modifiedTime="${Date.now()}" amver="1002351" ffver="106" am="com.alightcreative.motion/5.0.270.1002578" amplatform="android" retime="freeze" retimeAdaptFPS="false">
${xmlElements.join('\n')}
</scene>`;

                    downloadFile(finalXml, `${fileName}.xml`);
                    showStatus('Download started', 'ready');

                    // Reset to idle gracefully
                    setTimeout(() => {
                        if (statusText.textContent === 'Download started') {
                            showStatus('', 'idle');
                        }
                    }, 4000);

                } catch (err) {
                    showStatus('Conversion error', 'ready');
                }
            }, 600);
        });

        // Trigger file download
        function downloadFile(content, filename) {
            const blob = new Blob([content], { type: 'text/xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
