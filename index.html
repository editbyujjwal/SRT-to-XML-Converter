        const STYLE_CONFIG = {

                color: "#ff7f7f7f", // Gray

            },
            reels: {

                size: "30.000000",

                color: "#ffffd700", // Gold / Yellow

            }
        };

        // --- State Management ---
        let currentStyle = null;
        let currentFileName = "Converted_Subtitles";
        let generatedXML = ""; 

        // --- Custom Toast System ---
        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const isError = type === 'error';
            const bgClass = isError ? 'bg-red-50 border-red-100 text-red-800' : 'bg-emerald-50 border-emerald-100 text-emerald-800';
            
            const errorSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 text-red-500"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>`;
            const successSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 text-emerald-500"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>`;

            toast.className = `flex items-center gap-2.5 px-4 py-3 rounded-xl border shadow-lg backdrop-blur-md toast-enter-active ${bgClass} pointer-events-auto`;
            toast.innerHTML = `${isError ? errorSvg : successSvg} <span class="font-semibold text-xs tracking-wide">${message}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.replace('toast-enter-active', 'toast-leave');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // --- Step Navigation & Style Selection ---
        function selectStyle(styleId) {
            currentStyle = styleId;
            
            // Reset all cards styling
            document.querySelectorAll('.style-card').forEach(card => {
                card.classList.remove('border-indigo-500', 'bg-white/90', 'ring-4', 'ring-indigo-500/20');
                card.classList.add('border-transparent', 'bg-white/60');
                card.querySelector('.radio-indicator').classList.remove('border-indigo-500');
                card.querySelector('.radio-indicator').classList.add('border-slate-300');
                card.querySelector('.inner-dot').classList.remove('opacity-100', 'scale-100');
                card.querySelector('.inner-dot').classList.add('opacity-0', 'scale-50');
            });

            // Apply selected styling to the clicked card
            const selectedCard = document.getElementById(`card-${styleId}`);
            selectedCard.classList.remove('border-transparent', 'bg-white/60');
            selectedCard.classList.add('border-indigo-500', 'bg-white/90', 'ring-4', 'ring-indigo-500/20');
            selectedCard.querySelector('.radio-indicator').classList.remove('border-slate-300');
            selectedCard.querySelector('.radio-indicator').classList.add('border-indigo-500');
            selectedCard.querySelector('.inner-dot').classList.remove('opacity-0', 'scale-50');
            selectedCard.querySelector('.inner-dot').classList.add('opacity-100', 'scale-100');

            // Enable Continue Button
            const btn = document.getElementById('btnContinue');
            btn.disabled = false;
            btn.classList.remove('bg-slate-200', 'text-slate-400', 'cursor-not-allowed');
            btn.classList.add('bg-indigo-600', 'text-white', 'hover:bg-indigo-700', 'shadow-lg', 'hover:shadow-indigo-500/30', 'hover:-translate-y-0.5');
        }

        function goToStep2() {
            if (!currentStyle) return;
            
            // Update Label in Step 2
            document.getElementById('selectedStyleLabel').innerText = STYLE_CONFIG[currentStyle].name;
            
            // Transition
            document.getElementById('step1').classList.remove('view-active');
            document.getElementById('step1').classList.add('view-hidden');
            
            // Reset state of step 2
            document.getElementById('outputSection').classList.add('hidden');
            document.getElementById('outputSection').classList.remove('block');
            
            document.getElementById('step2').classList.remove('view-hidden');
            document.getElementById('step2').classList.add('view-active');
        }

        function goToStep1() {
            document.getElementById('step2').classList.remove('view-active');
            document.getElementById('step2').classList.add('view-hidden');
            
            document.getElementById('step1').classList.remove('view-hidden');
            document.getElementById('step1').classList.add('view-active');
        }

        // --- File Upload Handling ---
        const fileInput = document.getElementById('fileInput');
        const srtInput = document.getElementById('srtInput');
        const dropZone = document.getElementById('dropZone');
        const fileStatus = document.getElementById('fileStatus');
        const fileNameDisplay = document.getElementById('fileNameDisplay');

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.add('border-indigo-500', 'bg-indigo-50/80', 'scale-[1.02]');
            });
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.remove('border-indigo-500', 'bg-indigo-50/80', 'scale-[1.02]');
            });
        });

        dropZone.addEventListener('drop', (e) => {
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            try {
                fileInput.value = ''; // Reset input to allow re-uploading same file
                currentFileName = file.name.replace(/\.[^/.]+$/, "");
                
                fileNameDisplay.textContent = file.name;
                fileStatus.classList.remove('hidden');
                fileStatus.classList.add('flex');
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    srtInput.value = e.target.result;
                    processSRT(); // Auto-convert
                };
                reader.onerror = () => {
                    showToast('Failed to read file', 'error');
                };
                reader.readAsText(file);
            } catch (error) {
                showToast('Error uploading file', 'error');
                console.error(error);
            }
        }

        // --- Core Parsing & Conversion ---
        function processSRT() {
            try {
                const rawText = srtInput.value.trim();
                if (!rawText) {
                    showToast('Please paste text or upload a file', 'error');
                    return;
                }

                const subtitles = parseSRTContent(rawText);
                
                if (subtitles.length === 0) {
                    showToast('No valid timestamps found', 'error');
                    return;
                }

                generatedXML = generateAMXML(subtitles);
                
                const outputSection = document.getElementById('outputSection');
                outputSection.classList.remove('hidden');
                outputSection.classList.add('block');

                showToast('XML Generated based on Style', 'success');
            } catch (error) {
                showToast('Something went wrong during conversion', 'error');
                console.error(error);
            }
        }

        function parseSRTContent(text) {
            const normalizedText = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            const blocks = normalizedText.split(/\n{2,}/);
            const subtitles = [];

            blocks.forEach(block => {
                const lines = block.trim().split('\n');
                if (lines.length < 2) return;

                let timeLineIndex = -1;
                let match = null;
                const timeRegex = /^(\d{2}:\d{2}:\d{2}[,\.]\d{3})\s*-->\s*(\d{2}:\d{2}:\d{2}[,\.]\d{3})\s*(.*)$/;

                for (let i = 0; i < lines.length; i++) {
                    match = lines[i].match(timeRegex);
                    if (match) {
                        timeLineIndex = i;
                        break;
                    }
                }

                if (timeLineIndex !== -1 && match) {
                    const startMs = timeToMilliseconds(match[1]);
                    const endMs = timeToMilliseconds(match[2]);
                    let content = match[3] ? match[3].trim() : '';

                    for (let i = timeLineIndex + 1; i < lines.length; i++) {
                        const lineText = lines[i].trim();
                        if (lineText) {
                            if (content) content += '\n';
                            content += lineText;
                        }
                    }

                    if (content) {
                        subtitles.push({ startMs, endMs, content });
                    }
                }
            });

            return subtitles;
        }

        function timeToMilliseconds(timeString) {
            const parts = timeString.split(/[,\.]/);
            const timeParts = parts[0].split(':').map(Number);
            const ms = Number(parts[1] || 0);
            return (timeParts[0] * 3600000) + (timeParts[1] * 60000) + (timeParts[2] * 1000) + ms;
        }

        function generateAMXML(subtitles) {
            const totalTime = subtitles[subtitles.length - 1].endMs;
            const modifiedTime = Date.now();
            let elementId = 102351839;

            // Fetch formatting based on selected style
            const style = STYLE_CONFIG[currentStyle] || STYLE_CONFIG.minimal;

            let xml = `<?xml version='1.0' encoding='UTF-8' ?>\n`;
            xml += `<!-- Generated by Premium SRT Converter -->\n`;
            xml += `<scene title="${currentFileName}_${style.name.replace(/\s+/g, '')}" width="720" height="1280" exportWidth="720" exportHeight="1280" precompose="dynamicResolution" bgcolor="#ffd8d8d8" totalTime="${totalTime}" fps="24" modifiedTime="${modifiedTime}" amver="1002351" ffver="106" am="com.alightcreative.motion/5.0.270.1002578" amplatform="android" retime="freeze" retimeAdaptFPS="false">\n`;

            xml += `  <shape id="102351835" label="Rectangle 1" startTime="0" endTime="${totalTime}" fillType="color" mediaFillMode="fill" s=".rect">\n`;
            xml += `    <transform>\n`;
            xml += `      <location value="360.000000,640.000000,0.000000" />\n`;
            xml += `    </transform>\n`;
            xml += `    <property name="size" type="vec2" value="372.551697,712.413818" />\n`;
            xml += `  </shape>\n`;

            subtitles.forEach(sub => {
                const safeContent = sub.content
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&apos;');

                xml += `  <text id="${elementId++}" startTime="${sub.startMs}" endTime="${sub.endMs}" fillType="color" mediaFillMode="fill" size="${style.size}" font="${style.font}" wrapWidth="512" align="center">\n`;
                xml += `    <transform>\n`;
                // Applied the Dynamic Y Position based on style selected
                xml += `      <location value="360.000000,${style.yPos},0.000000" />\n`;
                xml += `    </transform>\n`;
                // Applied the Dynamic Color based on style selected
                xml += `    <fillColor value="${style.color}" />\n`;
                xml += `    <content>${safeContent}</content>\n`;
                xml += `  </text>\n`;
            });

            xml += `</scene>`;
            return xml;
        }

        // --- Trigger Download ---
        function downloadXML() {
            if (!generatedXML) {
                showToast('No XML data generated yet', 'error');
                return;
            }

            const styleSuffix = STYLE_CONFIG[currentStyle] ? `_${STYLE_CONFIG[currentStyle].name.replace(/\s+/g, '')}` : '';
            const finalFileName = `${currentFileName}${styleSuffix}.xml`;

            const blob = new Blob([generatedXML], { type: "text/xml" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement("a");
            a.href = url;
            a.download = finalFileName;
            document.body.appendChild(a);
            a.click();
            
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showToast('Download started', 'success');
        }
    </script>
</body>
